[build]
  publish = "web"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  included_files = [
    "assets/gucheng_poems_annotated.json",
    "assets/haizi_poems_annotated.json"
  ]

[[redirects]]
  from = "/api/themes"
  to = "/merged_theme_vocabulary.json"
  status = 200

[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/generate"
  status = 200
